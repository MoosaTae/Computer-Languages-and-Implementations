<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compiler Construction - Final Exam Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Mobile menu toggle -->
<button class="menu-toggle" onclick="toggleSidebar()">&#9776;</button>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>Compiler Guide</h1>
    <p>Final Exam - 80/20 Pareto</p>
  </div>
  <div class="sidebar-nav">
    <a class="nav-item active" onclick="navigateTo(0)">
      <span class="nav-num">0</span>Overview
    </a>
    <a class="nav-item" onclick="navigateTo(1)">
      <span class="nav-num">1</span>Intro to Compilers
      <span class="nav-badge badge-high">HIGH</span>
    </a>
    <a class="nav-item" onclick="navigateTo(2)">
      <span class="nav-num">2</span>Scanner
      <span class="nav-badge badge-mod">MOD</span>
    </a>
    <a class="nav-item" onclick="navigateTo(3)">
      <span class="nav-num">3</span>CFG & Left Recursion
      <span class="nav-badge badge-high">HIGH</span>
    </a>
    <a class="nav-item" onclick="navigateTo(4)">
      <span class="nav-num">4</span>FIRST & FOLLOW
      <span class="nav-badge badge-high">HIGH</span>
    </a>
    <a class="nav-item" onclick="navigateTo(5)">
      <span class="nav-num">5</span>Recursive Descent
      <span class="nav-badge badge-high">HIGH</span>
    </a>
    <a class="nav-item" onclick="navigateTo(6)">
      <span class="nav-num">6</span>Parse Trees
      <span class="nav-badge badge-high">HIGH</span>
    </a>
    <a class="nav-item" onclick="navigateTo(7)">
      <span class="nav-num">7</span>Code Generation
      <span class="nav-badge badge-high">HIGH</span>
    </a>
    <a class="nav-item" onclick="navigateTo(8)">
      <span class="nav-num">8</span>Activation Records
      <span class="nav-badge badge-high">HIGH</span>
    </a>
    <a class="nav-item" onclick="navigateTo(9)">
      <span class="nav-num">9</span>Garbage Collection
      <span class="nav-badge badge-mod">MOD</span>
    </a>
  </div>
  <div class="sidebar-footer">
    <span id="progress-text">Progress: 0 / 10</span>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main class="main">
  <div id="page-container" class="page active" style="display:block;">
    <p style="color:var(--text-muted);padding:48px;">Loading...</p>
  </div>
</main>

<script>
var pageCache = {};
var currentPage = 0;

function navigateTo(pageNum) {
  currentPage = pageNum;
  // Update sidebar
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  document.querySelectorAll('.nav-item')[pageNum].classList.add('active');
  window.scrollTo(0, 0);
  document.getElementById('sidebar').classList.remove('open');

  var container = document.getElementById('page-container');

  // Use cache if available
  if (pageCache[pageNum]) {
    container.innerHTML = pageCache[pageNum];
    bindChecklists();
    return;
  }

  // Fetch the page
  container.innerHTML = '<p style="color:var(--text-muted);padding:48px;">Loading...</p>';
  fetch('pages/page-' + pageNum + '.html')
    .then(function(r) { return r.text(); })
    .then(function(html) {
      pageCache[pageNum] = html;
      // Only render if still on this page
      if (currentPage === pageNum) {
        container.innerHTML = html;
        bindChecklists();
      }
    })
    .catch(function() {
      container.innerHTML = '<p style="color:var(--red);padding:48px;">Failed to load page.</p>';
    });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function bindChecklists() {
  document.querySelectorAll('.checklist li').forEach(function(li) {
    li.onclick = function() {
      li.classList.toggle('checked');
      updateProgress();
    };
  });
  updateProgress();
}

function updateProgress() {
  var total = document.querySelectorAll('.checklist li').length;
  var checked = document.querySelectorAll('.checklist li.checked').length;
  var pct = total > 0 ? Math.round((checked / total) * 100) : 0;
  document.getElementById('progress-text').textContent = 'Progress: ' + checked + ' / ' + total;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight') {
    if (currentPage < 9) navigateTo(currentPage + 1);
  }
  if (e.key === 'ArrowLeft') {
    if (currentPage > 0) navigateTo(currentPage - 1);
  }
});

// Load first page
navigateTo(0);
</script>

</body>
</html>
